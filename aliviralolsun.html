<style>
/* ── DESIGN TOKENS ─────────────────────────────────── */
:root{
  --bg:       #08070d;
  --bg2:      #100e18;
  --bg3:      #17141f;
  --surface:  rgba(255,255,255,0.045);
  --surface2: rgba(255,255,255,0.08);
  --border:   rgba(255,255,255,0.10);
  --border2:  rgba(255,255,255,0.18);
  --text:     #f6f5fb;
  --text2:    #a8a4c2;
  --text3:    #74708f;
  --accent:   #c44bff;
  --accent2:  #ff5da2;
  --accent3:  #8b5cff;
  --green:    #10b981;
  --green2:   #34d399;
  --rose:     #fb5072;
  --amber:    #fbbf24;
  --sky:      #38bdf8;
  --ig1:      #feda75;
  --ig2:      #fa7e1e;
  --ig3:      #d62976;
  --ig4:      #962fbf;
  --ig5:      #4f5bd5;
  --r6:6px; --r8:8px; --r10:10px; --r12:12px; --r14:14px; --r16:16px; --r20:20px; --r24:24px;
  --sidebar:  256px;
  --shadow:   0 4px 24px rgba(0,0,0,0.45);
  --shadow-lg:0 16px 60px rgba(0,0,0,0.7);
  --glow:     0 0 30px rgba(196,75,255,0.30);
  --ring:     0 0 0 3px rgba(196,75,255,0.35);
}
body.light{
  --bg:#eef0f6; --bg2:#ffffff; --bg3:#f5f6fb;
  --surface:rgba(15,23,42,0.04); --surface2:rgba(15,23,42,0.08);
  --border:rgba(15,23,42,0.10); --border2:rgba(15,23,42,0.18);
  --text:#15132a; --text2:#54506b; --text3:#8a87a3;
  --accent:#a020e8; --accent2:#e0457f; --accent3:#6d4fef;
  --shadow:0 4px 20px rgba(15,23,42,0.10);
  --shadow-lg:0 14px 50px rgba(15,23,42,0.22);
  --ring:0 0 0 3px rgba(160,32,232,0.25);
}
body.light .sidebar::before{background:radial-gradient(ellipse at 50% 0%,rgba(196,75,255,0.10),transparent 70%)}
body.light .logo-wordmark,body.light .page-title,body.light .stat-value{color:var(--text)}

*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;font-size:14.5px;line-height:1.6;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;letter-spacing:-0.01em}
:focus-visible{outline:none;box-shadow:var(--ring);border-radius:var(--r8)}
button,a,input,select,textarea{font-family:inherit}
@media (prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
::-webkit-scrollbar{width:7px;height:7px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
a{color:inherit}
svg.ico{vertical-align:-0.14em}

/* ── SIDEBAR ───────────────────────────────────────── */
.sidebar{position:fixed;left:0;top:0;bottom:0;width:var(--sidebar);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:200}
.sidebar::before{content:'';position:absolute;top:0;left:0;right:0;height:220px;background:radial-gradient(ellipse at 50% 0%,rgba(196,75,255,0.14),transparent 70%);pointer-events:none}
.logo-wrap{padding:26px 20px 22px;border-bottom:1px solid var(--border);position:relative}
.logo-wordmark{font-family:'Sora',sans-serif;font-size:18px;font-weight:800;letter-spacing:-0.5px;color:var(--text);line-height:1.1}
.logo-wordmark span{background:linear-gradient(120deg,var(--accent2),var(--accent),var(--accent3));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.logo-tag{font-size:10px;color:var(--text3);margin-top:5px;letter-spacing:0.7px;text-transform:uppercase;font-weight:600}
.logo-dot{position:absolute;top:30px;right:22px;width:8px;height:8px;border-radius:50%;background:var(--green2);box-shadow:0 0 0 3px rgba(52,211,153,0.18);animation:pulse 2.4s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.nav{flex:1;overflow-y:auto;padding:14px 12px 12px}
.nav-section{font-size:10px;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;color:var(--text3);padding:14px 12px 7px}
.nav-btn{width:100%;display:flex;align-items:center;gap:11px;padding:10px 12px;border:none;background:transparent;color:var(--text2);border-radius:var(--r10);cursor:pointer;font-size:13.5px;font-weight:500;text-align:left;transition:all .15s;margin-bottom:2px;position:relative}
.nav-btn:hover{background:var(--surface);color:var(--text)}
.nav-btn.active{background:linear-gradient(100deg,rgba(196,75,255,0.18),rgba(255,93,162,0.10));color:var(--text);font-weight:600}
.nav-btn.active::before{content:'';position:absolute;left:0;top:18%;bottom:18%;width:3px;border-radius:3px;background:linear-gradient(var(--accent2),var(--accent))}
.nav-icon{width:18px;height:18px;flex-shrink:0;display:flex;align-items:center;justify-content:center;opacity:.92}
.nav-icon svg{width:18px;height:18px}
.nav-badge{margin-left:auto;font-size:10px;font-weight:700;background:var(--accent);color:#fff;border-radius:20px;padding:1px 7px;min-width:18px;text-align:center}
.sidebar-foot{padding:12px;border-top:1px solid var(--border);display:flex;gap:8px}
.foot-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:9px;border:1px solid var(--border);background:var(--surface);color:var(--text2);border-radius:var(--r10);cursor:pointer;font-size:12px;font-weight:600;transition:all .15s}
.foot-btn:hover{background:var(--surface2);color:var(--text);border-color:var(--border2)}

/* ── MAIN ──────────────────────────────────────────── */
.main{margin-left:var(--sidebar);flex:1;min-height:100vh;width:calc(100% - var(--sidebar))}
.topbar{position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:14px;padding:16px 32px;background:rgba(8,7,13,0.72);backdrop-filter:blur(16px);border-bottom:1px solid var(--border)}
body.light .topbar{background:rgba(255,255,255,0.75)}
.burger{display:none;background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:var(--r8);width:38px;height:38px;cursor:pointer;font-size:18px}
.page-title{font-family:'Sora',sans-serif;font-size:21px;font-weight:700;letter-spacing:-0.4px}
.page-sub{font-size:12.5px;color:var(--text3);margin-top:2px}
.top-spacer{flex:1}
.live-clock{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--text2);background:var(--surface);border:1px solid var(--border);padding:7px 12px;border-radius:var(--r10);display:flex;align-items:center;gap:8px}
.live-clock b{color:var(--text);font-weight:600}
.content{padding:28px 32px 60px;max-width:1180px}

/* ── COMPONENTS ────────────────────────────────────── */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r16);box-shadow:var(--shadow)}
.card-pad{padding:22px}
.grid{display:grid;gap:16px}
.stat-grid{grid-template-columns:repeat(auto-fit,minmax(210px,1fr))}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r16);padding:20px;position:relative;overflow:hidden;transition:all .2s}
.stat-card:hover{border-color:var(--border2);transform:translateY(-2px)}
.stat-ico{width:42px;height:42px;border-radius:var(--r12);display:flex;align-items:center;justify-content:center;margin-bottom:14px}
.stat-ico svg{width:21px;height:21px}
.stat-value{font-family:'Sora',sans-serif;font-size:27px;font-weight:800;letter-spacing:-0.6px;line-height:1}
.stat-label{font-size:12.5px;color:var(--text2);margin-top:7px}
.stat-change{font-size:11.5px;margin-top:8px;font-weight:600}
.stat-change.up{color:var(--green2)} .stat-change.flat{color:var(--text3)}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:9px 15px;border:1px solid var(--border2);background:var(--surface);color:var(--text);border-radius:var(--r10);cursor:pointer;font-size:13px;font-weight:600;transition:all .15s;white-space:nowrap}
.btn:hover{background:var(--surface2);transform:translateY(-1px)}
.btn svg{width:15px;height:15px}
.btn-accent{background:linear-gradient(110deg,var(--accent),var(--accent2));border:none;color:#fff;box-shadow:0 4px 18px rgba(196,75,255,0.32)}
.btn-accent:hover{box-shadow:0 6px 24px rgba(196,75,255,0.45)}
.btn-ghost{background:transparent}
.btn-lg{padding:12px 20px;font-size:14px;border-radius:var(--r12)}
.btn-sm{padding:6px 11px;font-size:12px}
.btn[disabled]{opacity:.55;cursor:not-allowed;transform:none}

.section-head{display:flex;align-items:center;justify-content:space-between;gap:14px;margin:8px 0 16px}
.section-title{font-family:'Sora',sans-serif;font-size:17px;font-weight:700}
.section-title .muted{color:var(--text3);font-weight:500;font-size:13px;font-family:'Inter'}

.label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:7px}
.input,.select,.textarea{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:var(--r10);padding:11px 13px;font-size:13.5px;transition:all .15s}
.input:focus,.select:focus,.textarea:focus{border-color:var(--accent);box-shadow:var(--ring)}
.textarea{resize:vertical;min-height:80px;line-height:1.6}
.chip{display:inline-flex;align-items:center;gap:6px;padding:5px 11px;border-radius:20px;font-size:12px;font-weight:600;border:1px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer;transition:all .15s}
.chip:hover{border-color:var(--border2);color:var(--text)}
.chip.on{background:linear-gradient(110deg,rgba(196,75,255,0.22),rgba(255,93,162,0.14));border-color:var(--accent);color:var(--text)}

.pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;letter-spacing:.2px}
.pill-reels{background:rgba(214,41,118,0.16);color:#ff7cb3}
.pill-carousel{background:rgba(79,91,213,0.18);color:#8b96f0}
.pill-story{background:rgba(251,191,36,0.16);color:var(--amber)}
.pill-post{background:rgba(56,189,248,0.16);color:var(--sky)}
.pill-draft{background:var(--surface2);color:var(--text2)}
.pill-ready{background:rgba(16,185,129,0.16);color:var(--green2)}
.pill-done{background:rgba(120,120,140,0.18);color:var(--text3)}

.empty{text-align:center;padding:50px 20px;color:var(--text3)}
.empty svg{width:48px;height:48px;opacity:.5;margin-bottom:14px}
.empty h3{color:var(--text2);font-size:15px;font-weight:600;margin-bottom:6px}

/* idea cards */
.idea-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r16);padding:18px;transition:all .2s;position:relative;display:flex;flex-direction:column;gap:12px}
.idea-card:hover{border-color:var(--border2);box-shadow:var(--shadow)}
.idea-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.idea-title{font-family:'Sora',sans-serif;font-size:15.5px;font-weight:700;line-height:1.3}
.idea-hook{font-size:13px;color:var(--text);background:var(--surface);border-left:3px solid var(--accent);padding:9px 12px;border-radius:0 var(--r8) var(--r8) 0;line-height:1.5}
.idea-block{font-size:12.5px;color:var(--text2);line-height:1.6}
.idea-block b{color:var(--text);font-weight:600}
.idea-hashtags{font-size:12px;color:var(--accent3);word-break:break-word;line-height:1.7;font-weight:500}
.idea-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:11.5px;color:var(--text3)}
.score{display:inline-flex;align-items:center;gap:5px;font-weight:800;font-size:13px;font-family:'Sora'}
.score-ring{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;font-family:'Sora'}
.idea-actions{display:flex;gap:7px;flex-wrap:wrap;margin-top:2px;border-top:1px solid var(--border);padding-top:12px}

/* viral heatmap */
.heat-wrap{overflow-x:auto}
.heat-grid{border-collapse:separate;border-spacing:3px;min-width:560px}
.heat-grid th{font-size:10px;color:var(--text3);font-weight:600;padding:2px}
.heat-grid td{padding:0}
.heat-cell{width:100%;height:24px;border-radius:5px;min-width:30px;cursor:default;transition:transform .1s}
.heat-cell:hover{transform:scale(1.15)}
.heat-day{font-size:11px;color:var(--text2);font-weight:600;text-align:right;padding-right:8px;white-space:nowrap}
.heat-legend{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text3);margin-top:14px}
.legend-box{width:16px;height:16px;border-radius:4px}

/* countdown */
.countdown{display:flex;align-items:center;gap:16px;background:linear-gradient(110deg,rgba(196,75,255,0.14),rgba(255,93,162,0.07));border:1px solid var(--border2);border-radius:var(--r16);padding:20px 24px}
.cd-num{font-family:'Sora',sans-serif;font-size:32px;font-weight:800;letter-spacing:-1px;line-height:1}
.cd-time{font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:600;color:var(--accent2)}

/* calendar */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
.cal-head{font-size:11px;font-weight:700;color:var(--text3);text-align:center;text-transform:uppercase;letter-spacing:.5px;padding-bottom:4px}
.cal-day{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r10);min-height:96px;padding:8px;cursor:pointer;transition:all .15s;display:flex;flex-direction:column;gap:5px}
.cal-day:hover{border-color:var(--accent);background:var(--bg3)}
.cal-day.other{opacity:.38}
.cal-day.today{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}
.cal-daynum{font-size:12px;font-weight:700;color:var(--text2)}
.cal-day.today .cal-daynum{color:var(--accent2)}
.cal-evt{font-size:10.5px;font-weight:600;padding:3px 6px;border-radius:5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.3}
.cal-viral{position:relative}
.cal-viral::after{content:'⚡';position:absolute;top:6px;right:7px;font-size:11px;opacity:.7}

/* table */
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:left;font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;padding:10px 12px;border-bottom:1px solid var(--border)}
.tbl td{padding:12px;border-bottom:1px solid var(--border);color:var(--text2)}
.tbl tr:hover td{background:var(--surface)}

/* modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.62);backdrop-filter:blur(5px);z-index:500;display:flex;align-items:center;justify-content:center;padding:24px;animation:fade .15s}
@keyframes fade{from{opacity:0}}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r20);box-shadow:var(--shadow-lg);width:100%;max-width:560px;max-height:88vh;overflow-y:auto;animation:pop .18s}
@keyframes pop{from{transform:scale(.96);opacity:0}}
.modal-head{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;padding:22px 24px;border-bottom:1px solid var(--border)}
.modal-title{font-family:'Sora',sans-serif;font-size:18px;font-weight:700}
.modal-sub{font-size:12.5px;color:var(--text3);margin-top:3px}
.modal-body{padding:22px 24px;display:flex;flex-direction:column;gap:16px}
.close-btn{background:var(--surface);border:1px solid var(--border);color:var(--text2);width:32px;height:32px;border-radius:var(--r8);cursor:pointer;font-size:15px;flex-shrink:0}
.close-btn:hover{background:var(--surface2);color:var(--text)}
.tip-box{background:linear-gradient(110deg,rgba(196,75,255,0.10),rgba(56,189,248,0.06));border:1px solid var(--border);border-radius:var(--r12);padding:13px 15px;font-size:12.5px;color:var(--text2)}

/* toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--border2);color:var(--text);padding:13px 20px;border-radius:var(--r12);box-shadow:var(--shadow-lg);z-index:900;font-size:13.5px;font-weight:600;display:flex;align-items:center;gap:10px;animation:toastin .25s}
@keyframes toastin{from{transform:translate(-50%,20px);opacity:0}}
.toast.ok{border-color:rgba(52,211,153,0.5)} .toast.err{border-color:rgba(251,80,114,0.5)}

.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}

.ref-card{display:flex;gap:14px;align-items:center;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r14);padding:16px}
.ref-avatar{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--ig1),var(--ig3),var(--ig5));display:flex;align-items:center;justify-content:center;font-family:'Sora';font-weight:800;font-size:18px;color:#fff;flex-shrink:0;box-shadow:0 0 0 2px var(--bg2),0 0 0 4px rgba(214,41,118,0.4)}

.progress{height:8px;background:var(--surface2);border-radius:20px;overflow:hidden}
.progress-bar{height:100%;border-radius:20px;background:linear-gradient(90deg,var(--accent3),var(--accent2));transition:width .6s}

/* login */
.login-wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 0%,rgba(196,75,255,0.16),var(--bg) 60%);z-index:999;padding:24px}
.login-card{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r24);padding:40px;width:100%;max-width:400px;box-shadow:var(--shadow-lg);text-align:center}

@media(max-width:920px){
  .sidebar{transform:translateX(-100%);transition:transform .25s}
  body.sb-open .sidebar{transform:none}
  .main{margin-left:0;width:100%}
  .burger{display:flex;align-items:center;justify-content:center}
  .content,.topbar{padding-left:18px;padding-right:18px}
  .live-clock{display:none}
}
</style>
</head>

<script>

/* ---- AI PLUMBING (kanıtlanmış: Gemini/Groq/Claude tarayıcıdan) ---- */
function getApiKey(){return localStorage.getItem(K+'apikey')||'';}
function aiProvider(k){k=k||getApiKey();
  if(k.indexOf('sk-ant-')===0)return 'claude';
  if(k.indexOf('AIza')===0)return 'gemini';
  if(k.indexOf('gsk_')===0)return 'groq';
  if(k.indexOf('sk-')===0)return 'openai';
  return 'unknown';}
var AI_NAMES={claude:'Claude',gemini:'Google Gemini',groq:'Groq',openai:'OpenAI',unknown:'Bilinmiyor'};

function callAI(prompt,maxTokens,jsonMode){
  var key=getApiKey();
  if(!key){openModal('api');return Promise.reject(new Error('Önce API anahtarı girin.'));}
  var prov=aiProvider(key);
  function fail(r,d){var m=(d&&d.error&&d.error.message)||('HTTP '+r.status);
    if(r.status===401||r.status===403)m='API anahtarı geçersiz. ⚙ ile güncelleyin.';
    if(r.status===429)m='Ücretsiz kota doldu (429). Biraz bekleyin.';throw new Error(m);}
  function cors(e){if(e&&/Failed to fetch/i.test(e.message||''))throw new Error('Bu sağlayıcı tarayıcıdan çağrılamıyor (CORS). Ücretsiz Gemini (AIza...) kullanın.');throw e;}
  if(prov==='claude'){
    return fetch('https://api.anthropic.com/v1/messages',{method:'POST',
      headers:{'content-type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:ANTHROPIC_MODEL,max_tokens:maxTokens||1500,messages:[{role:'user',content:prompt}]})})
      .then(function(r){return r.json().then(function(d){if(!r.ok)fail(r,d);return (d.content&&d.content.find(function(b){return b.type==='text';})||{}).text||'';});}).catch(cors);
  }
  if(prov==='gemini'){
    var g={maxOutputTokens:maxTokens||1500,temperature:0.95};if(jsonMode)g.responseMimeType='application/json';
    return fetch('https://generativelanguage.googleapis.com/v1beta/models/'+GEMINI_MODEL+':generateContent?key='+encodeURIComponent(key),
      {method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({contents:[{parts:[{text:prompt}]}],generationConfig:g})})
      .then(function(r){return r.json().then(function(d){if(!r.ok)fail(r,d);var c=d.candidates&&d.candidates[0];
        if(c&&c.finishReason==='SAFETY')throw new Error('İçerik güvenlik filtresine takıldı.');
        return (c&&c.content&&c.content.parts&&c.content.parts.map(function(p){return p.text||'';}).join(''))||'';});}).catch(cors);
  }
  if(prov==='groq'){
    var gb={model:GROQ_MODEL,max_tokens:maxTokens||1500,messages:[{role:'user',content:prompt}]};if(jsonMode)gb.response_format={type:'json_object'};
    return fetch('https://api.groq.com/openai/v1/chat/completions',{method:'POST',
      headers:{'content-type':'application/json','authorization':'Bearer '+key},body:JSON.stringify(gb)})
      .then(function(r){return r.json().then(function(d){if(!r.ok)fail(r,d);return (d.choices&&d.choices[0]&&d.choices[0].message&&d.choices[0].message.content)||'';});}).catch(cors);
  }
  var ob={model:OPENAI_MODEL,max_tokens:maxTokens||1500,messages:[{role:'user',content:prompt}]};if(jsonMode)ob.response_format={type:'json_object'};
  return fetch('https://api.openai.com/v1/chat/completions',{method:'POST',
    headers:{'content-type':'application/json','authorization':'Bearer '+key},body:JSON.stringify(ob)})
    .then(function(r){return r.json().then(function(d){if(!r.ok)fail(r,d);return (d.choices&&d.choices[0]&&d.choices[0].message&&d.choices[0].message.content)||'';});})
    .catch(function(e){if(e&&/Failed to fetch/i.test(e.message||''))throw new Error('OpenAI tarayıcıdan çağrılamıyor (CORS). Gemini kullanın.');throw e;});
}
function parseJSON(txt){
  if(!txt)return null;
  try{return JSON.parse(txt);}catch(e){}
  var m=txt.match(/\[[\s\S]*\]/)||txt.match(/\{[\s\S]*\}/);
  if(m){try{return JSON.parse(m[0]);}catch(e){}}
  return null;
}

   VİRAL SAAT MOTORU (Türkiye)
   intensity: 0 düşük → 3 zirve. Araştırma temelli genel optimumlar.
════════════════════════════════════════════════════ */
var DAYS=['Pzt','Sal','Çar','Per','Cum','Cmt','Paz'];
var DAYS_FULL=['Pazartesi','Salı','Çarşamba','Perşembe','Cuma','Cumartesi','Pazar'];
// satır=gün(0 Pzt..6 Paz), sütun=saat 0..23
function buildHeat(){
  var H=[];for(var d=0;d<7;d++){var row=[];for(var h=0;h<24;h++)row.push(0);H.push(row);}
  function set(days,hours,val){days.forEach(function(d){hours.forEach(function(h){H[d][h]=Math.max(H[d][h],val);});});}
  var wd=[0,1,2,3,4], we=[5,6];
  // sabah
  set(wd,[7,8],1); set(wd,[9],1);
  // öğle
  set([0,1,2,3,4],[12,13],2); set([1,2,3],[12,13],2);
  // akşam prime (en güçlü)
  set([1,2,3],[20,21],3); set([1,2,3,4],[19,22],2); set([0,4],[20,21],2);
  set(wd,[18,23],1);
  // hafta sonu
  set(we,[11,12,13],2); set(we,[20,21,22],3); set(we,[19,23],2); set(we,[10,14],1);
  set([6],[20,21],3);
  return H;
}
var HEAT=buildHeat();
var HEAT_COLORS=['rgba(255,255,255,0.05)','rgba(196,75,255,0.28)','rgba(255,93,162,0.55)','rgba(255,93,162,0.92)'];
function heatColor(v){return HEAT_COLORS[v]||HEAT_COLORS[0];}

// JS getDay: 0=Paz..6=Cmt → bizim index: 0=Pzt..6=Paz
function jsDayToIdx(jsDay){return (jsDay+6)%7;}
// Sıradaki viral pencere (intensity>=3, yoksa>=2)
function nextViralWindow(){
  var now=new Date();
  for(var add=0;add<=8;add++){
    var dt=new Date(now.getFullYear(),now.getMonth(),now.getDate()+add,0,0,0);
    var di=jsDayToIdx(dt.getDay());
    for(var h=0;h<24;h++){
      if(HEAT[di][h]>=3){
        var when=new Date(dt.getFullYear(),dt.getMonth(),dt.getDate(),h,0,0);
        if(when>now)return when;
      }
    }
  }
  return null;
}
function topWindowsForDay(di){
  var out=[];for(var h=0;h<24;h++){if(HEAT[di][h]>=2)out.push({h:h,v:HEAT[di][h]});}
  out.sort(function(a,b){return b.v-a.v||a.h-b.h;});return out.slice(0,4);
}

  for(var day=1;day<=daysInMonth;day++){

    var tw=topWindowsForDay(di);var hasViral=tw.length&&tw[0].v>=3;

/* Kütüphanedeki (henüz kuyruğa girmemiş) fikirleri, gösterilen ayın bu/önümüzdeki günlerinin en iyi viral slotlarına dağıt */
function autoFillWeek(){
  var now=new Date();
  // kuyrukta olmayan, viral skoru yüksek fikirler
  var queuedTitles={};queue.forEach(function(q){queuedTitles[q.title]=1;});
  var pool=ideas.filter(function(it){return !queuedTitles[it.title];}).sort(function(a,b){return (b.viralScore||0)-(a.viralScore||0);});
  if(!pool.length){toast('Önce stüdyodan fikir üret (kuyrukta olmayan).','err');return;}
  // önümüzdeki 7 günün zirve slotları
  var slots=[];
  for(var add=0;add<7&&slots.length<pool.length;add++){
    var dt=new Date(now.getFullYear(),now.getMonth(),now.getDate()+add);
    var di=jsDayToIdx(dt.getDay());var tw=topWindowsForDay(di);
    if(tw.length){var best=tw[0];var when=new Date(dt.getFullYear(),dt.getMonth(),dt.getDate(),best.h,0,0);
      if(when>now)slots.push({key:dkey(dt),time:pad(best.h)+':00'});}
  }
  if(!slots.length){toast('Uygun viral slot bulunamadı.','err');return;}
  var n=Math.min(pool.length,slots.length),added=0;
  for(var i=0;i<n;i++){var it=pool[i];var s=slots[i];
    queue.unshift({id:uid(),title:it.title,hook:it.hook,script:it.script,sound:it.sound,engagement:it.engagement,caption:it.caption,hashtags:it.hashtags,format:it.format,ref:it.ref,viralScore:it.viralScore,date:s.key,time:s.time,status:'ready',notified:false});added++;}
  save();toast(added+' içerik viral slotlara yerleştirildi ✓','ok');render();
}

  growth.slice().reverse().forEach(function(g,ri){var idx=growth.length-1-ri;var prev=growth[idx-1];var ch=prev?g.followers-prev.followers:0;
    h+='<tr><td>'+esc(g.date)+'</td><td style="color:var(--text);font-weight:600">'+g.followers.toLocaleString('tr-TR')+'</td><td>'+(g.reach||'—')+'</td><td>'+(g.engagement||'—')+'</td>'
      +'<td style="color:'+(ch>0?'var(--green2)':ch<0?'var(--rose)':'var(--text3)')+'">'+(ch>0?'+':'')+ch+'</td>'
      +'<td><button class="btn btn-ghost btn-sm" onclick="deleteGrowth('+idx+')">'+ic('trash')+'</button></td></tr>';});
  h+='</table></div>';
  return h;
}
function growthChart(){
  var data=growth.map(function(g){return g.followers;});if(data.length<2)return '<div style="color:var(--text3);text-align:center;padding:20px">Grafik için en az 2 ölçüm gerekir.</div>';
  var W=600,Hh=180,pad=10;var max=Math.max.apply(null,data),min=Math.min.apply(null,data);var rng=(max-min)||1;
  var pts=data.map(function(v,i){var x=pad+i*(W-2*pad)/(data.length-1);var y=Hh-pad-(v-min)/rng*(Hh-2*pad);return [x,y];});
  var path=pts.map(function(p,i){return (i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1);}).join(' ');
  var area=path+' L'+pts[pts.length-1][0].toFixed(1)+' '+(Hh-pad)+' L'+pts[0][0].toFixed(1)+' '+(Hh-pad)+' Z';
  var dots=pts.map(function(p){return '<circle cx="'+p[0].toFixed(1)+'" cy="'+p[1].toFixed(1)+'" r="3.5" fill="var(--accent2)"/>';}).join('');
  return '<div style="font-size:13px;color:var(--text2);margin-bottom:10px">Takipçi gelişimi</div>'
    +'<svg viewBox="0 0 '+W+' '+Hh+'" style="width:100%;height:auto;overflow:visible"><defs><linearGradient id="gfill" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="var(--accent)" stop-opacity="0.35"/><stop offset="100%" stop-color="var(--accent)" stop-opacity="0"/></linearGradient></defs>'
    +'<path d="'+area+'" fill="url(#gfill)"/><path d="'+path+'" fill="none" stroke="var(--accent2)" stroke-width="2.5" stroke-linejoin="round"/>'+dots+'</svg>';
}
function deleteGrowth(i){growth.splice(i,1);save();render();}

  fetch(url+'/api/health').then(function(r){return r.json();}).then(function(d){
    if(!d.ok)throw new Error('Backend yanıtı geçersiz');
    if(!d.configured){autoStatusMsg(false,'Backend ayakta ✓ ama token/IG ID eksik (config.json). Bekleyen: '+d.pending);return;}
    // verify hesabı
    return fetch(url+'/api/verify',{method:'POST',headers:{'content-type':'application/json','x-api-token':tok}}).then(function(r){return r.json();}).then(function(v){
      if(v.ok&&v.account)autoStatusMsg(true,'✓ Bağlandı — <b>@'+esc(v.account.username||'?')+'</b>'+(v.account.followers_count!=null?' · '+v.account.followers_count+' takipçi':'')+(d.hasPublicUrl?'':' <br>⚠ publicBaseUrl yok — medya paylaşılamaz.'));
      else autoStatusMsg(false,'Bağlandı ama doğrulama başarısız: '+esc((v&&v.error)||'?'));
    });
  }).catch(function(e){autoStatusMsg(false,'Bağlanılamadı: '+esc(e.message)+' (URL/CORS/ngrok kapalı olabilir)');});
}

function readFileData(file){return new Promise(function(res,rej){var fr=new FileReader();fr.onload=function(){res(fr.result);};fr.onerror=rej;fr.readAsDataURL(file);});}
function loadCoverFile(input){var f=input&&input.files&&input.files[0];if(!f)return;
  var capEl=document.getElementById('auto-caption');if(capEl)modal.data.caption=capEl.value;
  var whenEl=document.getElementById('auto-when');if(whenEl)modal.data.when=whenEl.value;
  readFileData(f).then(function(d){modal.data.coverUrl=d;render();});}
function clearCover(){delete modal.data.coverUrl;var q=queue.find(function(x){return x.id===modal.data.id;});if(q)delete q.coverUrl;render();}
function uploadData(filename,dataB64){var hdr={'content-type':'application/json','x-api-token':settings.autoToken||''};
  return fetch(settings.autoUrl+'/api/upload',{method:'POST',headers:hdr,body:JSON.stringify({filename:filename,dataBase64:dataB64})})
    .then(function(r){return r.json();}).then(function(u){if(!u.ok)throw new Error(u.error||'yükleme hatası');return u.url;});}
function asStatus(ok,msg){var el=document.getElementById('autosend-status');if(!el)return;el.style.display='block';
  el.style.background=ok?'rgba(16,185,129,0.1)':'rgba(251,80,114,0.1)';el.style.color=ok?'var(--green2)':'#fda4af';el.innerHTML=msg;}
/* video/foto yoksa: tarayıcıda Canvas ile markalı kapak (hook/başlık metinli) — anahtarsız, anında, %100 çalışır */
var COVER_THEMES=[
  ['#6d4fef','#e0457f'],   // mor → pembe
  ['#12101d','#7c3aed'],   // koyu → mor
  ['#ff6a3d','#c0297a'],   // gün batımı
  ['#0ea5a4','#2563eb'],   // teal → mavi
  ['#0b0b12','#e0457f']    // siyah → pembe
];
function wrapText(ctx,text,maxW){
  var words=String(text||'').replace(/\s+/g,' ').trim().split(' '),lines=[],cur='';
  words.forEach(function(w){var t=cur?cur+' '+w:w;if(ctx.measureText(t).width>maxW&&cur){lines.push(cur);cur=w;}else cur=t;});
  if(cur)lines.push(cur);return lines;
}
function drawCover(text,theme,cb){
  var c=document.createElement('canvas');c.width=1080;c.height=1350;var x=c.getContext('2d');
  var g=x.createLinearGradient(0,0,1080,1350);g.addColorStop(0,theme[0]);g.addColorStop(1,theme[1]);
  x.fillStyle=g;x.fillRect(0,0,1080,1350);
  // dekoratif yumuşak ışık
  var rg=x.createRadialGradient(880,240,40,880,240,520);rg.addColorStop(0,'rgba(255,255,255,0.18)');rg.addColorStop(1,'rgba(255,255,255,0)');x.fillStyle=rg;x.fillRect(0,0,1080,1350);
  // alt karartma (okunabilirlik)
  var go=x.createLinearGradient(0,650,0,1350);go.addColorStop(0,'rgba(0,0,0,0)');go.addColorStop(1,'rgba(0,0,0,0.4)');x.fillStyle=go;x.fillRect(0,650,1080,700);
  // üst etiket
  x.textBaseline='top';x.fillStyle='rgba(255,255,255,0.92)';x.font='800 30px Sora, Inter, sans-serif';
  x.fillText('@'+(settings.handle||'yucelsinmedia').toUpperCase(),84,96);
  x.fillStyle='rgba(255,255,255,0.5)';x.fillRect(84,150,90,5);
  // ana metin (hook/başlık)
  x.textBaseline='alphabetic';x.fillStyle='#ffffff';
  var fs=92,maxW=912,lines;x.font='800 '+fs+'px Sora, Inter, sans-serif';lines=wrapText(x,text,maxW);
  while((lines.length>6||fs*1.16*lines.length>820)&&fs>44){fs-=6;x.font='800 '+fs+'px Sora, Inter, sans-serif';lines=wrapText(x,text,maxW);}
  var lh=fs*1.16,startY=(1350-lines.length*lh)/2+fs*0.85;
  x.shadowColor='rgba(0,0,0,0.32)';x.shadowBlur=20;x.shadowOffsetY=5;
  lines.forEach(function(ln,i){x.fillText(ln,84,startY+i*lh);});
  x.shadowColor='transparent';
  // alt: handle
  x.font='600 30px Inter, sans-serif';x.fillStyle='rgba(255,255,255,0.92)';x.textBaseline='alphabetic';
  x.fillText('@'+(settings.handle||'yucelsinmedia'),84,1270);
  cb(c.toDataURL('image/jpeg',0.92));
}
function genCover(id){
  var q=queue.find(function(x){return x.id===id;});if(!q)return;
  var capEl=document.getElementById('auto-caption');if(capEl)modal.data.caption=capEl.value;
  var whenEl=document.getElementById('auto-when');if(whenEl)modal.data.when=whenEl.value;
  var btn=document.getElementById('cover-btn');if(btn){btn.disabled=true;btn.innerHTML='<span class="spinner"></span> Tasarlanıyor...';}
  var ti=(modal.data.coverTheme==null?0:(modal.data.coverTheme+1)%COVER_THEMES.length);modal.data.coverTheme=ti;
  var text=(q.hook&&q.hook.length<=110)?q.hook:q.title;
  function go(){ try{ drawCover(text,COVER_THEMES[ti],function(d){modal.data.coverUrl=d;render();}); }catch(e){ if(btn){btn.disabled=false;} asStatus(false,'Kapak çizilemedi: '+esc(e.message)); } }
  if(document.fonts&&document.fonts.ready)document.fonts.ready.then(go); else go();
}

function doAutoSend(id,now){
  var q=queue.find(function(x){return x.id===id;});if(!q)return;
  if(!settings.autoUrl){asStatus(false,'Önce otomasyonu bağla.');return;}
  var fileEl=document.getElementById('auto-file');var f=fileEl&&fileEl.files&&fileEl.files[0];
  var cover=modal.data.coverUrl||q.coverUrl;
  if(!f&&!cover){asStatus(false,'Kendi medyanı seç ya da "Otomatik kapak üret"e bas.');return;}
  var caption=document.getElementById('auto-caption').value;
  var whenVal=document.getElementById('auto-when').value;
  var scheduledAt=now?new Date().toISOString():(whenVal?new Date(whenVal).toISOString():new Date().toISOString());
  var b1=document.getElementById('autosend-btn'),b2=document.getElementById('autosend-now-btn');
  function lock(){if(b1)b1.disabled=true;if(b2)b2.disabled=true;}
  function unlock(){if(b1){b1.disabled=false;b1.innerHTML='⏰ Zamanla';}if(b2){b2.disabled=false;b2.innerHTML='⚡ Şimdi Paylaş';}}
  lock();
  asStatus(true,'<span class="spinner" style="border-top-color:var(--green2)"></span> '+(now?'Yükleniyor & paylaşılıyor (video ise 1 dk sürebilir)...':'Medya yükleniyor...'));
  var hdr={'content-type':'application/json','x-api-token':settings.autoToken||''};
  // payload hazırla: video+kapak / sadece foto / sadece kapak
  var prep;
  if(f){
    var isVideo=/video|mp4|mov|quicktime/i.test(f.type)||/\.(mp4|mov)$/i.test(f.name);
    prep=readFileData(f).then(function(d){return uploadData(f.name,d);}).then(function(mediaUrl){
      if(isVideo){
        if(cover){return uploadData('kapak.jpg',cover).then(function(cu){return {mediaUrl:mediaUrl,mediaType:'REELS',coverUrl:cu};});}
        return {mediaUrl:mediaUrl,mediaType:'REELS'};
      }
      return {mediaUrl:mediaUrl,mediaType:'IMAGE'}; // foto gönderisi (kapak yok sayılır)
    });
  }else{
    prep=uploadData('kapak.jpg',cover).then(function(mediaUrl){return {mediaUrl:mediaUrl,mediaType:'IMAGE'};});
  }
  prep.then(function(payload){
    payload.title=q.title;payload.caption=caption;payload.scheduledAt=scheduledAt;
    return fetch(settings.autoUrl+'/api/posts',{method:'POST',headers:hdr,body:JSON.stringify(payload)}).then(function(r){return r.json();});
  }).then(function(p){
    if(!p.ok)throw new Error(p.error||'gönderi hatası');
    if(now){
      return fetch(settings.autoUrl+'/api/publish/'+p.post.id,{method:'POST',headers:hdr}).then(function(r){return r.json();}).then(function(pub){
        if(!pub.ok)throw new Error(pub.error||'paylaşım hatası');
        q.autoStatus='published';q.autoId=p.post.id;q.status='done';save();
        asStatus(true,'🎉 PAYLAŞILDI! @'+(settings.handle||'yucelsinmedia')+' hesabında yayında.');
        setTimeout(function(){closeModal();render();},1800);
      });
    }else{
      q.autoStatus='scheduled';q.autoId=p.post.id;q.date=whenVal?whenVal.slice(0,10):q.date;q.time=whenVal?whenVal.slice(11,16):q.time;save();
      asStatus(true,'✓ Zamanlandı! Backend '+new Date(scheduledAt).toLocaleString('tr-TR')+' tarihinde otomatik paylaşacak.');
      setTimeout(function(){closeModal();render();},1500);
    }
  }).catch(function(e){asStatus(false,'Hata: '+esc(e.message));unlock();});
}

function enableNotifications(){
  if(!('Notification' in window)){toast('Tarayıcı bildirim desteklemiyor','err');return;}
  Notification.requestPermission().then(function(p){if(p==='granted'){settings.notify=true;save();toast('Bildirimler açıldı ✓','ok');new Notification('Aliviralolsun',{body:'Bildirimler aktif — viral saatte seni uyaracağım ⚡'});}else{toast('Bildirim izni verilmedi','err');}render();});
}
function checkNotifications(){
  if(!settings.notify||!('Notification' in window)||Notification.permission!=='granted')return;
  var now=new Date();var nowKey=dkey(now);var nowMin=now.getHours()*60+now.getMinutes();
  queue.forEach(function(q){if(q.status==='done'||q.notified||q.date!==nowKey||!q.time)return;
    var p=q.time.split(':');var qm=parseInt(p[0])*60+parseInt(p[1]);
    if(nowMin>=qm&&nowMin<=qm+5){q.notified=true;save();
      try{new Notification('⚡ Viral saat geldi!',{body:q.title+' — şimdi paylaş!',requireInteraction:true});}catch(e){}
    }});
}

    +'</div></div>';

/* SHA-256 hash — PIN düz metin saklanmaz */
function sha256(str){
  if(window.crypto&&window.crypto.subtle){
    var data=new TextEncoder().encode(str);
    return crypto.subtle.digest('SHA-256',data).then(function(buf){
      return Array.prototype.map.call(new Uint8Array(buf),function(b){return ('0'+b.toString(16)).slice(-2);}).join('');
    });
  }
  return Promise.resolve('plain:'+str); // çok eski tarayıcı yedeği
}
function doLogin(){
  var el=document.getElementById('login-pin');var v=el?el.value:'';var err=document.getElementById('login-err');
  var saved=localStorage.getItem(K+'pinh');
  sha256(v).then(function(h){
    if(!saved){if(!v){if(err){err.style.display='block';err.textContent='Bir şifre belirle.';}return;}localStorage.setItem(K+'pinh',h);localStorage.setItem(K+'auth','1');render();return;}
    if(h===saved){localStorage.setItem(K+'auth','1');render();}
    else{if(err){err.style.display='block';err.textContent='Şifre yanlış.';}}
  });
}
function logout(){localStorage.removeItem(K+'auth');render();}
