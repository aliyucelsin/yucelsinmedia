<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>YucelSinMedia — Dental Social Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Sora:wght@600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
<style>
/* ── DESIGN TOKENS ─────────────────────────────────── */
:root{
  --bg:       #07070b;
  --bg2:      #101018;
  --bg3:      #16161f;
  --surface:  rgba(255,255,255,0.045);
  --surface2: rgba(255,255,255,0.08);
  --border:   rgba(255,255,255,0.10);
  --border2:  rgba(255,255,255,0.17);
  --text:     #f5f5fb;
  --text2:    #a6a6c2;
  --text3:    #74748f;
  --accent:   #8b7dff;
  --accent2:  #b7a5ff;
  --green:    #10b981;
  --green2:   #4ade80;
  --rose:     #fb5072;
  --amber:    #fbbf24;
  --sky:      #56c5fb;
  --ig:       #f0467f;
  --tt:       #69c9d0;
  --yt:       #ff4444;
  --r6:       6px;
  --r8:       8px;
  --r10:      10px;
  --r12:      12px;
  --r16:      16px;
  --r20:      20px;
  --sidebar:  248px;
  --shadow:   0 4px 24px rgba(0,0,0,0.45);
  --shadow-lg:0 12px 56px rgba(0,0,0,0.65);
  --glow:     0 0 24px rgba(139,125,255,0.28);
  --ring:     0 0 0 3px rgba(139,125,255,0.35);
}

/* ── RESET ─────────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;font-size:14.5px;line-height:1.6;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;letter-spacing:-0.01em;font-feature-settings:'cv11','ss01'}

/* ── FOCUS (a11y) ──────────────────────────────────── */
:focus-visible{outline:none;box-shadow:var(--ring);border-radius:var(--r8)}
button,a,input,select,textarea{font-family:inherit}

/* ── REDUCED MOTION ────────────────────────────────── */
@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:0.01ms !important;animation-iteration-count:1 !important;transition-duration:0.01ms !important;scroll-behavior:auto !important}
}

/* ── SCROLLBAR ─────────────────────────────────────── */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,0.28)}

/* ── SIDEBAR ───────────────────────────────────────── */
.sidebar{
  position:fixed;left:0;top:0;bottom:0;width:var(--sidebar);
  background:var(--bg2);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;z-index:200;
}
.sidebar::before{
  content:'';position:absolute;top:0;left:0;right:0;height:200px;
  background:radial-gradient(ellipse at 50% 0%,rgba(124,110,245,0.12),transparent 70%);
  pointer-events:none;
}
.logo-wrap{
  padding:28px 20px 22px;
  border-bottom:1px solid var(--border);
  position:relative;
}
.logo-wordmark{
  font-family:'Sora',sans-serif;font-size:17px;font-weight:800;
  letter-spacing:-0.5px;color:var(--text);line-height:1.15;
}
.logo-wordmark span{
  background:linear-gradient(135deg,var(--accent2),var(--sky));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.logo-tag{
  font-size:10px;color:var(--text3);margin-top:4px;letter-spacing:0.6px;
  text-transform:uppercase;font-weight:500;
}
.logo-dot{
  position:absolute;top:28px;right:20px;
  width:8px;height:8px;border-radius:50%;
  background:var(--green);
  box-shadow:0 0 8px var(--green);
  animation:blink 2.5s ease-in-out infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}

.nav{flex:1;padding:14px 12px;display:flex;flex-direction:column;gap:2px;overflow-y:auto}
.nav-section{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1.2px;padding:14px 8px 7px;margin-top:4px}
.nav-btn{
  display:flex;align-items:center;gap:11px;
  padding:10px 11px;border-radius:var(--r10);border:1px solid transparent;
  background:transparent;color:var(--text2);
  cursor:pointer;text-align:left;font-size:13px;
  width:100%;transition:background .18s,color .18s,border-color .18s;font-family:inherit;
  font-weight:500;position:relative;
}
.nav-btn:hover:not(.active){background:var(--surface);color:var(--text)}
.nav-btn.active{
  background:linear-gradient(135deg,rgba(139,125,255,0.20),rgba(139,125,255,0.05));
  color:var(--accent2);font-weight:600;
  border:1px solid rgba(139,125,255,0.28);
}
.nav-btn.active::before{
  content:'';position:absolute;left:-1px;top:50%;transform:translateY(-50%);
  width:3px;height:55%;background:var(--accent2);border-radius:0 3px 3px 0;box-shadow:0 0 10px var(--accent2);
}
.nav-icon{width:20px;height:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0;opacity:0.92}
.nav-icon svg{display:block;width:18px;height:18px}
.nav-badge{
  margin-left:auto;background:rgba(243,63,94,0.15);color:var(--rose);
  border:1px solid rgba(243,63,94,0.25);border-radius:20px;
  padding:1px 7px;font-size:9px;font-weight:700;letter-spacing:0.3px;
}

.sidebar-foot{
  padding:16px 20px;border-top:1px solid var(--border);
  background:rgba(0,0,0,0.2);
}
.user-row{display:flex;align-items:center;gap:10px}
.user-av{
  width:34px;height:34px;border-radius:var(--r10);
  background:linear-gradient(135deg,rgba(124,110,245,0.3),rgba(56,189,248,0.2));
  border:1px solid rgba(124,110,245,0.3);
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:800;color:var(--accent2);
  font-family:'Sora',sans-serif;
}
.user-name{font-size:13px;font-weight:600;color:var(--text)}
.user-role{font-size:11px;color:var(--text2);margin-top:1px}

/* ── MAIN ──────────────────────────────────────────── */
.main{margin-left:var(--sidebar);padding:32px 36px;max-width:1100px;min-height:100vh;flex:1}

/* ── PAGE HEADER ───────────────────────────────────── */
.page-header{margin-bottom:28px}
.page-title{
  font-family:'Sora',sans-serif;font-size:23px;font-weight:800;
  color:var(--text);letter-spacing:-0.6px;margin-bottom:5px;
}
.page-sub{font-size:13px;color:var(--text2);font-weight:400;line-height:1.5}

/* ── CARDS ─────────────────────────────────────────── */
.card{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--r16);
}
.card-pad{padding:18px 20px}
.card-glass{
  background:rgba(255,255,255,0.03);
  backdrop-filter:blur(12px);
  border:1px solid var(--border);
  border-radius:var(--r16);
}

/* ── STAT CARDS ────────────────────────────────────── */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;margin-bottom:32px}
.stat-card{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--r16);padding:20px;
  position:relative;overflow:hidden;
  transition:all 0.2s;cursor:default;
}
.stat-card::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,var(--c,rgba(124,110,245,0.08)),transparent 60%);
  pointer-events:none;
}
.stat-card:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:var(--shadow)}
.stat-icon{
  width:42px;height:42px;border-radius:var(--r10);
  display:flex;align-items:center;justify-content:center;
  margin-bottom:15px;color:var(--accent2);
  background:rgba(255,255,255,0.05);border:1px solid var(--border);
}
.stat-value{font-family:'Sora',sans-serif;font-size:30px;font-weight:800;color:var(--text);letter-spacing:-1px;line-height:1}
.stat-label{font-size:12.5px;color:var(--text2);margin-top:6px;font-weight:500}
.stat-change{
  font-size:11.5px;color:var(--green2);margin-top:9px;
  display:flex;align-items:center;gap:4px;font-weight:600;
}
.stat-change::before{content:'↑';font-size:11px}

/* ── BUTTONS ───────────────────────────────────────── */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:7px;
  padding:10px 16px;border-radius:var(--r8);border:none;
  font-family:inherit;font-size:13px;font-weight:600;letter-spacing:-0.01em;
  cursor:pointer;transition:transform .15s,box-shadow .15s,background .15s,color .15s,border-color .15s;white-space:nowrap;
}
.btn-accent{background:linear-gradient(135deg,var(--accent),#6d5fef);color:#fff;box-shadow:0 2px 14px rgba(139,125,255,0.32)}
.btn-accent:hover{transform:translateY(-1px);box-shadow:0 6px 22px rgba(139,125,255,0.45)}
.btn-green{background:linear-gradient(135deg,var(--green),#059669);color:#fff;box-shadow:0 2px 12px rgba(16,185,129,0.28)}
.btn-green:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(16,185,129,0.4)}
.btn-rose{background:linear-gradient(135deg,var(--ig),#be185d);color:#fff;box-shadow:0 2px 12px rgba(240,70,127,0.28)}
.btn-rose:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(240,70,127,0.4)}
.btn-ghost{background:var(--surface);border:1px solid var(--border2);color:var(--text2)}
.btn-ghost:hover{background:var(--surface2);color:var(--text)}
.btn-sm{padding:7px 12px;font-size:12px;border-radius:var(--r6)}
.btn-lg{padding:13px 22px;font-size:14px;border-radius:var(--r10)}
.btn:disabled{opacity:0.4;cursor:not-allowed;transform:none !important;box-shadow:none !important}

/* ── INPUTS ────────────────────────────────────────── */
.input{
  background:var(--bg3);border:1px solid var(--border);
  border-radius:var(--r8);padding:10px 12px;
  color:var(--text);font-size:14px;outline:none;
  width:100%;font-family:inherit;transition:border-color .15s,box-shadow .15s;
}
.input:focus{border-color:rgba(139,125,255,0.6);box-shadow:var(--ring)}
.input::placeholder{color:var(--text3)}
select.input option{background:var(--bg3)}
textarea.input{resize:vertical;line-height:1.7;font-family:'Inter',system-ui,sans-serif;font-size:13.5px}

/* ── LABELS ────────────────────────────────────────── */
.label{font-size:11px;color:var(--text2);font-weight:600;letter-spacing:0.5px;text-transform:uppercase;display:block;margin-bottom:6px}

/* ── TREND CARDS ───────────────────────────────────── */
.trend-card{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--r12);padding:13px 16px;
  display:flex;align-items:center;gap:13px;
  cursor:pointer;transition:all 0.18s;position:relative;overflow:hidden;
}
.trend-card::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,var(--pc,rgba(124,110,245,0.05)),transparent 50%);
  opacity:0;transition:opacity 0.18s;pointer-events:none;
}
.trend-card:hover{border-color:var(--border2);transform:translateX(4px);box-shadow:var(--shadow)}
.trend-card:hover::after{opacity:1}
.trend-platform{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  width:60px;height:48px;border-radius:var(--r8);flex-shrink:0;
  font-size:10px;font-weight:700;gap:3px;
}
.trend-info{flex:1;min-width:0}
.trend-title{font-weight:600;font-size:13.5px;color:var(--text);overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.trend-tag{font-size:11px;color:var(--text2);margin-top:3px;font-family:'JetBrains Mono',monospace}
.trend-stats{text-align:right;flex-shrink:0}
.trend-growth{font-size:13px;font-weight:700;color:var(--green2)}
.trend-views{font-size:10.5px;color:var(--text3);margin-top:2px}
.hot-badge{
  background:linear-gradient(135deg,#ff6b35,#ff0055);
  border-radius:20px;padding:3px 10px;font-size:9px;font-weight:800;
  color:#fff;letter-spacing:0.4px;flex-shrink:0;
}
.open-badge{
  background:var(--surface);border:1px solid var(--border2);
  border-radius:var(--r6);padding:4px 10px;font-size:10px;
  color:var(--text2);flex-shrink:0;font-weight:500;
}

/* ── FILTER PILLS ──────────────────────────────────── */
.filter-pill{
  padding:6px 14px;border-radius:20px;border:1px solid var(--border);
  background:transparent;color:var(--text2);cursor:pointer;
  font-size:12px;font-family:inherit;font-weight:500;transition:all 0.15s;
}
.filter-pill.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
.filter-pill:hover:not(.active){background:var(--surface);border-color:var(--border2);color:var(--text)}

/* ── PATIENT CARDS ─────────────────────────────────── */
.patient-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px}
.patient-card{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--r16);overflow:hidden;transition:all 0.2s;
}
.patient-card:hover{border-color:var(--border2);box-shadow:var(--shadow)}
.patient-head{
  padding:14px 18px;border-bottom:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:center;
}
.patient-name{font-weight:700;font-size:14px;color:var(--text)}
.patient-meta{font-size:11px;color:var(--text2);margin-top:2px}
.status-pill{
  border-radius:20px;padding:3px 10px;font-size:10px;font-weight:600;
  display:inline-block;
}
.photo-grid{display:grid;grid-template-columns:1fr 1fr}
.photo-slot{
  position:relative;aspect-ratio:1;background:var(--bg3);
  cursor:pointer;overflow:hidden;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;
  transition:background 0.15s;
}
.photo-slot:hover{background:rgba(255,255,255,0.04)}
.photo-slot img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.photo-label{
  position:absolute;bottom:6px;left:6px;
  border-radius:5px;padding:2px 8px;font-size:9px;font-weight:700;
  background:rgba(0,0,0,0.75);backdrop-filter:blur(4px);
}

/* ── INFLUENCER ROWS ───────────────────────────────── */
.inf-row{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--r12);padding:14px 16px;
  display:flex;align-items:center;gap:13px;flex-wrap:wrap;
  transition:all 0.15s;
}
.inf-row:hover{border-color:var(--border2);background:rgba(255,255,255,0.02)}
.inf-av{
  width:42px;height:42px;border-radius:var(--r10);
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:800;font-family:'Sora',sans-serif;
  flex-shrink:0;
}
.src-badge{
  font-size:9px;font-weight:700;border-radius:var(--r6);
  padding:2px 7px;display:inline-block;letter-spacing:0.3px;
}
/* gönderim durumu noktası */
.st-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0}
.st-dot.pending{background:var(--rose);box-shadow:0 0 9px var(--rose);animation:blink 1.1s ease-in-out infinite}
.st-dot.sent{background:var(--green2);box-shadow:0 0 9px var(--green2)}
.inf-row.is-sent{border-color:rgba(74,222,128,0.30);background:rgba(74,222,128,0.04)}
.icon-btn{width:30px;height:30px;border-radius:var(--r8);border:1px solid var(--border2);background:var(--surface);color:var(--text2);cursor:pointer;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.icon-btn:hover{background:var(--surface2);color:var(--text)}
.icon-btn.danger:hover{background:rgba(244,63,94,0.15);border-color:rgba(244,63,94,0.4);color:var(--rose)}

/* ── MODAL ─────────────────────────────────────────── */
.modal-overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,0.8);backdrop-filter:blur(8px);
  display:flex;align-items:center;justify-content:center;
  z-index:999;padding:20px;animation:fadeIn 0.2s ease;
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{
  background:var(--bg2);border:1px solid var(--border2);
  border-radius:var(--r20);padding:28px;
  max-width:620px;width:100%;
  max-height:85vh;overflow-y:auto;
  box-shadow:var(--shadow-lg);
  animation:slideUp 0.25s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.modal-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px}
.modal-title{font-family:'Sora',sans-serif;font-size:16px;font-weight:700;color:var(--text)}
.modal-sub{font-size:11.5px;color:var(--text2);margin-top:2px}
.close-btn{
  width:30px;height:30px;border-radius:var(--r8);
  background:var(--surface);border:1px solid var(--border);
  color:var(--text2);cursor:pointer;font-size:14px;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.15s;flex-shrink:0;
}
.close-btn:hover{background:var(--surface2);color:var(--text)}
.close-btn.danger:hover{background:rgba(244,63,94,0.15);border-color:rgba(244,63,94,0.4);color:var(--rose)}

/* ── FORM SECTIONS ─────────────────────────────────── */
.form-group{margin-bottom:14px}
.section-divider{
  border:none;border-top:1px solid var(--border);margin:20px 0;
}

/* ── TAGS / HASHTAGS ───────────────────────────────── */
.tag{
  background:rgba(124,110,245,0.1);border:1px solid rgba(124,110,245,0.2);
  border-radius:20px;padding:3px 10px;font-size:11px;color:var(--accent2);
  display:inline-block;font-family:'JetBrains Mono',monospace;
}
.tag-ig{background:rgba(225,48,108,0.1);border-color:rgba(225,48,108,0.2);color:var(--ig)}

/* ── CONTENT BOXES ─────────────────────────────────── */
.hook-box{
  background:linear-gradient(135deg,rgba(124,110,245,0.08),rgba(56,189,248,0.04));
  border:1px solid rgba(124,110,245,0.2);border-radius:var(--r12);
  padding:16px;color:var(--text);font-size:15px;font-weight:600;
  line-height:1.65;font-family:'Sora',sans-serif;
}
.content-box{
  background:var(--bg3);border:1px solid var(--border);
  border-radius:var(--r12);padding:18px 18px 46px;
  color:#dcdce8;font-size:14.5px;line-height:1.78;
  white-space:pre-wrap;position:relative;min-height:80px;
  font-family:'Inter',system-ui,sans-serif;letter-spacing:-0.005em;
  max-width:68ch;
}
.copy-abs{
  position:absolute;bottom:10px;right:10px;
}
.tip-box{
  background:rgba(56,189,248,0.06);border:1px solid rgba(56,189,248,0.15);
  border-radius:var(--r10);padding:11px 14px;
  color:var(--sky);font-size:12px;line-height:1.5;
}
.algo-note{
  background:rgba(245,158,11,0.06);border:1px solid rgba(245,158,11,0.15);
  border-radius:var(--r10);padding:11px 14px;
  color:var(--amber);font-size:12px;line-height:1.5;
  display:flex;gap:10px;align-items:flex-start;
}

/* ── FORMAT BUTTONS ────────────────────────────────── */
.fmt-btn{
  display:flex;align-items:center;gap:9px;
  padding:9px 11px;border-radius:var(--r8);border:none;
  background:transparent;border-left:2px solid transparent;
  color:var(--text3);cursor:pointer;text-align:left;
  width:100%;font-family:inherit;font-size:12.5px;transition:all 0.12s;
}
.fmt-btn:hover:not(.active){background:var(--surface);color:var(--text2)}
.fmt-btn.active{
  background:linear-gradient(90deg,rgba(225,48,108,0.12),rgba(225,48,108,0.04));
  border-left-color:var(--ig);color:#f472b6;font-weight:600;
}

/* ── VARIANT TABS ──────────────────────────────────── */
.var-tab{
  flex:1;padding:9px;border-radius:var(--r8);border:none;
  background:var(--surface);border-bottom:2px solid transparent;
  color:var(--text3);cursor:pointer;font-size:12px;
  transition:all 0.15s;font-family:inherit;font-weight:500;
}
.var-tab.active{
  background:rgba(225,48,108,0.1);border-bottom-color:var(--ig);
  color:#f472b6;font-weight:700;
}

/* ── PERSPECTIVE TOGGLE ────────────────────────────── */
.persp-btn{
  flex:1;padding:12px 8px;border-radius:var(--r10);
  border:1.5px solid var(--border);background:var(--bg3);
  color:var(--text3);cursor:pointer;font-family:inherit;
  text-align:center;transition:all 0.15s;
}
.persp-btn.active{
  border-color:var(--ig);background:rgba(225,48,108,0.08);color:#f9a8d4;
}

/* ── UPLOAD ZONE ───────────────────────────────────── */
.upload-zone{
  background:rgba(16,185,129,0.04);
  border:1.5px dashed rgba(16,185,129,0.25);
  border-radius:var(--r16);padding:18px;
  transition:all 0.15s;
}
.upload-zone:hover{background:rgba(16,185,129,0.07);border-color:rgba(16,185,129,0.4)}

/* ── TREND BAR ─────────────────────────────────────── */
.trend-bar{
  background:linear-gradient(90deg,rgba(225,48,108,0.06),transparent);
  border:1px solid rgba(225,48,108,0.14);border-radius:var(--r12);
  padding:10px 16px;margin-bottom:20px;
  display:flex;align-items:center;gap:10px;flex-wrap:wrap;
}

/* ── AUTO BTN ──────────────────────────────────────── */
.auto-btn{
  background:var(--surface);border:1px solid var(--border);
  border-radius:20px;padding:6px 14px;color:var(--text2);
  font-size:11.5px;cursor:pointer;display:flex;align-items:center;
  gap:6px;font-family:inherit;font-weight:500;transition:all 0.15s;
}
.auto-btn.on{
  background:rgba(16,185,129,0.1);border-color:rgba(16,185,129,0.3);
  color:var(--green2);font-weight:600;
}
.live-dot{width:7px;height:7px;border-radius:50%;background:currentColor;animation:blink 2s infinite}

/* ── ALL-VERSIONS ──────────────────────────────────── */
.versions-box{
  background:var(--bg3);border:1px solid var(--border);
  border-radius:var(--r12);padding:16px;
}

/* ── SECTION LABEL ─────────────────────────────────── */
.s-label{
  font-size:10.5px;color:var(--text2);font-weight:700;
  text-transform:uppercase;letter-spacing:0.9px;margin-bottom:9px;display:block;
}

/* ── ANIMATIONS ────────────────────────────────────── */
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse-ring{0%,100%{opacity:1}50%{opacity:0.3}}
.spin{display:inline-block;animation:spin 0.8s linear infinite}
.pulse{animation:pulse-ring 1.4s ease-in-out infinite;display:inline-block}

/* ── LOADING STATE ─────────────────────────────────── */
.loading-card{
  background:var(--bg2);border:1px solid rgba(124,110,245,0.15);
  border-radius:var(--r16);padding:60px;text-align:center;
}

/* ── EMPTY STATE ───────────────────────────────────── */
.empty-state{
  background:var(--bg2);border:1.5px dashed var(--border);
  border-radius:var(--r16);padding:60px 40px;text-align:center;
}

/* ── DIVIDER ───────────────────────────────────────── */
.divider{height:1px;background:var(--border);margin:20px 0}

/* ── TOOLTIP ───────────────────────────────────────── */
[title]{cursor:pointer}

/* ── SEARCH BAR ────────────────────────────────────── */
.search-wrap{position:relative}
.search-wrap .input{padding-left:36px}
.search-icon{
  position:absolute;left:12px;top:50%;transform:translateY(-50%);
  color:var(--text3);font-size:13px;pointer-events:none;
}

/* ── INTERVIEW LAYOUT (responsive grid) ────────────── */
.interview-grid{display:grid;grid-template-columns:250px 1fr;gap:22px;align-items:start}

/* ── MOBILE TOPBAR + DRAWER (gizli; sadece mobilde) ── */
.mobile-topbar{display:none}
.sidebar-backdrop{display:none}

/* ══ RESPONSIVE ══════════════════════════════════════ */
@media (max-width:860px){
  .mobile-topbar{
    display:flex;align-items:center;gap:12px;
    position:fixed;top:0;left:0;right:0;height:56px;z-index:300;
    background:var(--bg2);border-bottom:1px solid var(--border);padding:0 14px;
  }
  .hamburger{
    width:40px;height:40px;border-radius:var(--r8);flex-shrink:0;
    border:1px solid var(--border2);background:var(--surface);color:var(--text);
    display:flex;align-items:center;justify-content:center;cursor:pointer;
  }
  .mtb-logo{font-family:'Sora',sans-serif;font-weight:800;font-size:15px;color:var(--text);flex:1;letter-spacing:-0.4px}
  .mtb-logo span{background:linear-gradient(135deg,var(--accent2),var(--sky));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}

  .sidebar{
    transform:translateX(-100%);
    transition:transform .26s ease;
    box-shadow:var(--shadow-lg);
    width:min(84vw,300px);z-index:400;
  }
  body.sb-open .sidebar{transform:translateX(0)}
  .sidebar-backdrop{
    display:block;position:fixed;inset:0;background:rgba(0,0,0,0.6);

  }
  body.sb-open .sidebar-backdrop{opacity:1;pointer-events:auto}

  .main{margin-left:0;padding:72px 16px 32px;max-width:100%}
  .interview-grid{grid-template-columns:1fr}
  .stat-grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-bottom:24px}
  .page-title{font-size:20px}
  .modal{padding:22px}
  .trend-bar{padding:10px 12px}
}
@media (max-width:480px){

  .patient-grid{grid-template-columns:1fr}

  .trend-views{display:none}
  .trend-platform{width:54px;height:46px}
  .open-badge{display:none}
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
// AI yanıtından JSON'u toleranslı şekilde çıkar (markdown fence + çevre metni temizler)
function parseLoose(text){
  var t=String(text||'').replace(/```json/gi,'').replace(/```/g,'').trim();
  try{return JSON.parse(t);}catch(e){}
  var s=t.indexOf('{'),a=t.indexOf('['),start=-1,open='{',close='}';
  if(a!==-1&&(a<s||s===-1)){start=a;open='[';close=']';}else if(s!==-1){start=s;}
  if(start!==-1){var end=t.lastIndexOf(close);if(end>start){try{return JSON.parse(t.slice(start,end+1));}catch(e2){}}}
  throw new Error('Yanıt JSON olarak okunamadı. Modeli/anahtarı değiştirip tekrar deneyin.');
}

      method:'POST',
      headers:{'content-type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:ANTHROPIC_MODEL,max_tokens:maxTokens||1000,messages:[{role:'user',content:userPrompt}]})
    }).then(function(r){return r.json().then(function(d){ if(!r.ok)fail(r,d); return (d.content&&d.content.find(function(b){return b.type==='text';})||{}).text||''; });}).catch(corsGuard);
  }
  if(prov==='gemini'){
    var gcfg={maxOutputTokens:maxTokens||1000,temperature:0.9};
    if(jsonMode)gcfg.responseMimeType='application/json';
    return fetch('https://generativelanguage.googleapis.com/v1beta/models/'+GEMINI_MODEL+':generateContent?key='+encodeURIComponent(key),{
      method:'POST',headers:{'content-type':'application/json'},
      body:JSON.stringify({contents:[{parts:[{text:userPrompt}]}],generationConfig:gcfg})
    }).then(function(r){return r.json().then(function(d){
      if(!r.ok)fail(r,d);
      var c=d.candidates&&d.candidates[0];
      if(c&&c.finishReason==='SAFETY')throw new Error('İçerik güvenlik filtresine takıldı. Notları/sözleri yumuşatıp tekrar deneyin.');
      return (c&&c.content&&c.content.parts&&c.content.parts.map(function(pt){return pt.text||'';}).join(''))||'';
    });}).catch(corsGuard);
  }
  if(prov==='groq'){
    var gbody={model:GROQ_MODEL,max_tokens:maxTokens||1000,messages:[{role:'user',content:userPrompt}]};
    if(jsonMode)gbody.response_format={type:'json_object'};
    return fetch('https://api.groq.com/openai/v1/chat/completions',{
      method:'POST',headers:{'content-type':'application/json','authorization':'Bearer '+key},
      body:JSON.stringify(gbody)
    }).then(function(r){return r.json().then(function(d){ if(!r.ok)fail(r,d); return (d.choices&&d.choices[0]&&d.choices[0].message&&d.choices[0].message.content)||''; });}).catch(corsGuard);
  }
  // OpenAI / bilinmeyen (tarayıcıdan doğrudan CORS ile engellenir)
  var obody={model:OPENAI_MODEL,max_tokens:maxTokens||1000,messages:[{role:'user',content:userPrompt}]};
  if(jsonMode)obody.response_format={type:'json_object'};
  return fetch('https://api.openai.com/v1/chat/completions',{
    method:'POST',headers:{'content-type':'application/json','authorization':'Bearer '+key},
    body:JSON.stringify(obody)
  }).then(function(r){return r.json().then(function(d){ if(!r.ok)fail(r,d); return (d.choices&&d.choices[0]&&d.choices[0].message&&d.choices[0].message.content)||''; });}).catch(function(e){
    if(e&&/Failed to fetch/i.test(e.message||''))throw new Error('OpenAI tarayıcıdan doğrudan çağrılamıyor (CORS). Ücretsiz Google Gemini (AIza...) anahtarı kullanın.');
    throw e;
  });
}

/* ════════ KALICI DEPOLAMA (localStorage) ═══════════ */
function saveState(){
  try{
    localStorage.setItem('ysm_patients',JSON.stringify(patients));
    localStorage.setItem('ysm_myInfluencers',JSON.stringify(myInfluencers));
    localStorage.setItem('ysm_sentInf',JSON.stringify(sentInf));
    localStorage.setItem('ysm_deletedInf',JSON.stringify(deletedInf));
  }catch(e){/* kota dolabilir (fotoğraflar büyükse) — sessiz geç */}
}
function loadState(){
  try{
    var p=localStorage.getItem('ysm_patients');if(p)patients=JSON.parse(p);
    var m=localStorage.getItem('ysm_myInfluencers');if(m)myInfluencers=JSON.parse(m);
    var s=localStorage.getItem('ysm_sentInf');if(s)sentInf=JSON.parse(s);
    var d=localStorage.getItem('ysm_deletedInf');if(d)deletedInf=JSON.parse(d);
  }catch(e){}
}

/* ════════ RENDER CORE ══════════════════════════════ */
function render(){
  var sections={};
  TABS.forEach(function(t){if(!sections[t.section])sections[t.section]=[];sections[t.section].push(t);});
  var navHTML='';
  Object.keys(sections).forEach(function(sec){
    navHTML+='<div class="nav-section">'+sec+'</div>';
    sections[sec].forEach(function(t){
      var i=TABS.indexOf(t);
      navHTML+='<button class="nav-btn'+(i===activeTab?' active':'')+'" onclick="sw('+i+')">'
        +'<span class="nav-icon">'+ic(t.icon)+'</span>'
        +'<span>'+t.label+'</span>'
        +(t.badge?'<span class="nav-badge">'+t.badge+'</span>':'')
        +'</button>';
    });
  });
  document.getElementById('nav').innerHTML=navHTML;
  var pages=[rDash,rTrends,rPatients,rInfluencers,rContent,rInterview];
  document.getElementById('main').innerHTML=pages[activeTab]()+(apiModal?rApiModal():'');
}
function sw(i){activeTab=i;document.body.classList.remove('sb-open');window.scrollTo(0,0);render();}

function addP(){

  patients.push({id:Date.now(),name:n.value,treatment:t.value,date:d?d.value||new Date().toLocaleDateString('tr-TR'):'',status:'Devam Ediyor',before:null,after:null});
  saveState();render();
}
function trigUp(pid,type){uploadPid=pid;uploadType=type;document.getElementById('fup').click();}
function handleUp(e){
  var file=e.target.files[0];if(!file)return;
  // Yenilemede kaybolmaması için fotoğrafı data URL (base64) olarak sakla
  var reader=new FileReader();
  reader.onload=function(ev){
    var url=ev.target.result;
    patients=patients.map(function(p){if(p.id===uploadPid){var np=Object.assign({},p);np[uploadType]=url;return np;}return p;});
    saveState();render();
  };
  reader.readAsDataURL(file);
  e.target.value='';
}

function loadExcel(e){
  var file=e.target.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=function(ev){
    try{
      var wb=XLSX.read(new Uint8Array(ev.target.result),{type:'array'});
      var rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:''});
      function g(row,keys){for(var k in row){for(var j=0;j<keys.length;j++){if(k.toLowerCase().replace(/[\s_-]/g,'')===keys[j].toLowerCase().replace(/[\s_-]/g,''))return String(row[k]).trim();}}return '';}
      excelInfluencers=rows.map(function(row,i){
        var handle=g(row,['handle','hesap','instagram','username']);
        var name=g(row,['ad','name','adsoyad','fullname','isim']);
        var platform=g(row,['platform','kanal'])||'Instagram';
        var followers=g(row,['takipci','takipçi','followers','subscribers','abone']);
        var email=g(row,['email','eposta','mail']);
        var niche=g(row,['nis','niche','kategori','category','alan']);
        var country=g(row,['ulke','ülke','country','konum']);
        var note=g(row,['not','note','aciklama','description']);
        var eng=g(row,['etkilesim','engagement']);
        if(!handle&&name)handle='@'+name.replace(/\s/g,'').toLowerCase();
        return{id:'xl_'+i,handle:handle.charAt(0)==='@'?handle:'@'+handle,name,platform:platform.charAt(0).toUpperCase()+platform.slice(1).toLowerCase(),followers,email,niche,country,note,eng,av:(handle||name||'?').replace('@','').slice(0,2).toUpperCase()};
      }).filter(function(r){return r.handle&&r.handle!=='@';});
      render();
    }catch(err){alert('Hata: '+err.message);}
  };
  reader.readAsArrayBuffer(file);
}
function clearExcel(){excelInfluencers=[];render();}

}

  if(isLoading){
    return '<div class="loading-card">'
      +'<div class="pulse" style="font-size:40px;margin-bottom:18px">⊕</div>'
      +'<div style="color:var(--ig);font-weight:700;font-size:16px;margin-bottom:8px">İçerik hazırlanıyor...</div>'
      +'<div style="color:var(--text3);font-size:12.5px">Hasta hikayesi işleniyor · Trendler entegre ediliyor</div>'
      +'</div>';
  }
  if(!interviewResult){
    return '<div class="empty-state">'
      +'<div style="margin-bottom:16px;color:var(--accent2);display:flex;justify-content:center">'+ic(selFormat.icon,46)+'</div>'
      +'<div style="font-weight:700;font-size:16px;color:var(--text);margin-bottom:6px">'+selFormat.label+'</div>'
      +'<div style="color:var(--text2);font-size:13px">'+selFormat.desc+'</div>'
      +'<div style="color:var(--text3);font-size:11.5px;margin-top:10px">Soldan bilgileri gir ve "İçerik Üret" butonuna bas</div>'
      +'</div>';
  }
  if(interviewResult.error){
    return '<div class="card" style="padding:24px;text-align:center;border-color:rgba(244,63,94,0.2);background:rgba(244,63,94,0.04)">'
      +'<div style="color:var(--rose);font-size:13px;font-weight:600;margin-bottom:6px">İçerik üretilemedi</div>'
      +'<div style="color:var(--text2);font-size:12.5px;line-height:1.5;max-width:420px;margin:0 auto">'+esc(interviewResult.msg||'Bir hata oluştu. Lütfen tekrar deneyin.')+'</div>'
      +'<div style="display:flex;gap:8px;justify-content:center;margin-top:14px">'
      +'<button class="btn btn-ghost btn-sm" onclick="genInterview()">↻ Tekrar Dene</button>'
      +'<button class="btn btn-ghost btn-sm" onclick="setApiKey()">⚙ API Anahtarı</button>'
      +'</div></div>';
  }
  var variants=interviewResult.variants||[];
  var v=variants[activeVariant]||{};
  return '<div style="display:flex;flex-direction:column;gap:14px">'
    +(interviewResult.contentNote?'<div class="algo-note"><span style="font-size:16px;flex-shrink:0">◉</span><span>'+esc(interviewResult.contentNote)+'</span></div>':'')
    +(variants.length>1?'<div style="display:flex;gap:7px">'+variants.map(function(vv,i){return '<button class="var-tab'+(i===activeVariant?' active':'')+'" onclick="swVar('+i+')">'+esc(vv.label||'Versiyon '+(i+1))+'</button>';}).join('')+'</div>':'')
    +'<div class="card" style="overflow:hidden">'
    +'<div style="padding:13px 18px;border-bottom:1px solid var(--border);background:rgba(225,48,108,0.03);display:flex;justify-content:space-between;align-items:center">'
    +'<div><div style="font-weight:700;color:var(--ig);font-size:13.5px;display:flex;align-items:center;gap:7px">'+ic(selFormat.icon,16)+esc(v.label||selFormat.label)+'</div>'+(v.bestTime?'<div style="color:var(--text3);font-size:11px;margin-top:2px">⏰ '+esc(v.bestTime)+'</div>':'')+'</div>'
    +'<div style="display:flex;gap:7px"><button class="btn btn-ghost btn-sm" onclick="genInterview()">↻ Yenile</button>'
    +'<button class="btn btn-sm '+(copiedKey==='all'?'btn-green':'btn-rose')+'" onclick="cpAll()">'+(copiedKey==='all'?'✓ Kopyalandı':'⎘ Tümünü Kopyala')+'</button></div>'
    +'</div>'
    +'<div style="padding:20px;display:flex;flex-direction:column;gap:14px">'
    +(v.hook?'<div><div class="s-label">❝ HOOK — İlk Cümle</div><div class="hook-box" style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px"><span>'+esc(v.hook)+'</span><button class="btn btn-ghost btn-sm" style="flex-shrink:0" onclick="cpPart(\'hook\')">'+(copiedKey==='hook'?'✓':'⎘')+'</button></div></div>':'')
    +'<div><div class="s-label">◈ İÇERİK</div><div class="content-box">'+esc(v.content||'')+'<button class="btn btn-ghost btn-sm copy-abs" onclick="cpPart(\'content\')">'+(copiedKey==='content'?'✓ Kopyalandı':'⎘ Kopyala')+'</button></div></div>'
    +(v.hashtags&&v.hashtags.length?'<div><div class="s-label"># HASHTAGLER</div><div style="display:flex;flex-wrap:wrap;gap:6px;align-items:center">'+v.hashtags.map(function(h){return '<span class="tag tag-ig">'+esc(h)+'</span>';}).join('')+'<button class="btn btn-ghost btn-sm" onclick="cpPart(\'tags\')">'+(copiedKey==='tags'?'✓':'⎘')+'</button></div></div>':'')
    +(v.postingTip?'<div class="tip-box"><strong>◎ Paylaşım İpucu:</strong> '+esc(v.postingTip)+'</div>':'')
    +'</div></div>'
    +(variants.length>1?'<div class="versions-box"><div class="s-label" style="margin-bottom:10px">Tüm Versiyonlar</div>'+variants.map(function(vv,i){return '<div style="display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border)"><div style="width:22px;height:22px;border-radius:50%;background:rgba(225,48,108,0.1);border:1px solid rgba(225,48,108,0.2);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--ig);">'+(i+1)+'</div><div style="flex:1;color:var(--text2);font-size:12.5px">'+esc(vv.label||'')+'</div><button class="btn btn-ghost btn-sm" onclick="cpVar('+i+')">⎘ Kopyala</button></div>';}).join('')+'</div>':'')
    +'</div>';
}

function swVar(i){activeVariant=i;var o=document.getElementById('iout');if(o)o.innerHTML=rInterviewOut();}
function cpAll(){
  if(!interviewResult||!interviewResult.variants)return;
  var v=interviewResult.variants[activeVariant];if(!v)return;
  navigator.clipboard.writeText((v.hook||'')+'\n\n'+(v.content||'')+'\n\n'+((v.hashtags||[]).join(' '))).catch(function(){});
  copiedKey='all';var o=document.getElementById('iout');if(o)o.innerHTML=rInterviewOut();
  setTimeout(function(){copiedKey=null;var o2=document.getElementById('iout');if(o2)o2.innerHTML=rInterviewOut();},2200);
}
function cpPart(key){
  if(!interviewResult||!interviewResult.variants)return;
  var v=interviewResult.variants[activeVariant];if(!v)return;
  var text=key==='hook'?v.hook||'':key==='content'?v.content||'':(v.hashtags||[]).join(' ');
  navigator.clipboard.writeText(text).catch(function(){});
  copiedKey=key;var o=document.getElementById('iout');if(o)o.innerHTML=rInterviewOut();
  setTimeout(function(){copiedKey=null;var o2=document.getElementById('iout');if(o2)o2.innerHTML=rInterviewOut();},2200);
}
function cpVar(i){
  if(!interviewResult||!interviewResult.variants)return;
  var v=interviewResult.variants[i];if(!v)return;
  navigator.clipboard.writeText((v.hook||'')+'\n\n'+(v.content||'')+'\n\n'+((v.hashtags||[]).join(' '))).catch(function(){});
}
function genInterview(silent){
  if(!silent){isLoading=true;interviewResult=null;}
  var hotTrends=TRENDS.filter(function(t){return t.hot;}).map(function(t){return t.title+' ('+t.tag+')';}).join(', ');
  if(!silent){var o=document.getElementById('iout');if(o)o.innerHTML=rInterviewOut();}
  var btn=document.getElementById('gen-btn');
  if(btn&&!silent){btn.disabled=true;btn.innerHTML='<span class="spin">↻</span> Üretiliyor...';}
  var p='Sen Türkiye\'deki premium dental sağlık turizmi kliniğinin Instagram içerik yazarısın.\n\n'
      +'İçerik Formatı: '+selFormat.label+' — '+selFormat.desc+'\n'
      +'Dil: '+iLang+'\nTon: '+iVibe+'\n'
      +'Hasta Adı: '+(iName||'genel')+'\n'
      +'Geldiği Ülke: '+(iCountry||'belirtilmedi')+'\n'
      +'Tedavi: '+iTreat+'\n'
      +'Hastanın sözleri: '+(iQuote||'yok — sen yaz')+'\n'
      +'Ek notlar: '+(iNotes||'yok')+'\n'
      +'Anlatım: '+(iPerspective==='1st'?'1. tekil şahıs — HASTA kendi ağzından yazar ("I / Ben"). "I flew to Turkey..." gibi.':'3. tekil şahıs — KLİNİK hastayı anlatır. "Meet Sarah from the UK..." gibi.')+'\n'
      +'Trendler (entegre et): '+hotTrends+'\n\n'
      +'Klişesiz, gerçekçi, viral potansiyelli içerik üret. Bakış açısına kesinlikle uy. İçeriği seçilen dilde ('+iLang+') yaz.\n\n'
      +'SADECE JSON: {"variants":[{"label":"ad","hook":"ilk cümle","content":"tam metin","hashtags":["#tag"],"postingTip":"ipucu","bestTime":"saat"}],"contentNote":"algoritma notu"}';
  callAI(p,2000,true).then(function(text){
    try{interviewResult=parseLoose(text);}catch(e){interviewResult={error:true,msg:e.message};}
    if(interviewResult&&!interviewResult.error&&!(interviewResult.variants&&interviewResult.variants.length)){
      interviewResult={error:true,msg:'Model beklenen formatta içerik üretmedi. Tekrar deneyin.'};
    }
    activeVariant=0;lastRefreshed=new Date();isLoading=false;
    if(!silent)render();
    else{var o2=document.getElementById('iout');if(o2)o2.innerHTML=rInterviewOut();}
  }).catch(function(e){interviewResult={error:true,msg:(e&&e.message)||'Bilinmeyen hata'};isLoading=false;if(!silent)render();});
}

/* ════════ GİRİŞ (basit kapı — gerçek güvenlik değil) ═══════════════ */
var LOGIN_USER='admin', LOGIN_PASS='admin123';
function isAuthed(){return localStorage.getItem('ysm_auth')==='1';}
function renderLogin(){
  return '<div class="modal-overlay" style="z-index:2000;backdrop-filter:none;background:var(--bg)">'
    +'<div class="modal" style="max-width:380px">'
    +'<div style="text-align:center;margin-bottom:22px">'
    +'<div class="logo-wordmark" style="font-size:24px">Yucel<span>Sin</span>Media</div>'
    +'<div style="color:var(--text3);font-size:11.5px;letter-spacing:0.6px;text-transform:uppercase;margin-top:6px">Yönetim Paneli · Giriş</div>'
    +'</div>'
    +'<div style="display:flex;flex-direction:column;gap:13px">'
    +'<div><label class="label" for="lg-user">Kullanıcı Adı</label><input id="lg-user" class="input" autocomplete="username" placeholder="admin" onkeydown="if(event.key===\'Enter\')doLogin()"/></div>'
    +'<div><label class="label" for="lg-pass">Şifre</label><input id="lg-pass" class="input" type="password" autocomplete="current-password" placeholder="••••••" onkeydown="if(event.key===\'Enter\')doLogin()"/></div>'
    +'<div id="lg-err" style="display:none;background:rgba(244,63,94,0.08);border:1px solid rgba(244,63,94,0.25);border-radius:var(--r10);padding:9px 12px;color:#fda4af;font-size:12px">Kullanıcı adı veya şifre hatalı.</div>'
    +'<button class="btn btn-accent btn-lg" style="width:100%;margin-top:4px" onclick="doLogin()">Giriş Yap</button>'
    +'</div></div></div>';
}
function doLogin(){
  var u=(document.getElementById('lg-user')||{}).value||'';
  var p=(document.getElementById('lg-pass')||{}).value||'';
  if(u.trim()===LOGIN_USER && p===LOGIN_PASS){
    localStorage.setItem('ysm_auth','1');
    document.getElementById('login-gate').innerHTML='';
    boot();
  }else{
    var e=document.getElementById('lg-err'); if(e)e.style.display='block';
    var pe=document.getElementById('lg-pass'); if(pe){pe.value='';pe.focus();}
  }
}
function logout(){ localStorage.removeItem('ysm_auth'); location.reload(); }

/* ════════ BAŞLAT ═══════════════════════════════════ */
function boot(){
  var gate=document.getElementById('login-gate');
  if(!isAuthed()){
    if(gate)gate.innerHTML=renderLogin();
    var u=document.getElementById('lg-user'); if(u)u.focus();
    return;
  }
  if(gate)gate.innerHTML='';
  loadState();
  render();
}
boot();
</script>
